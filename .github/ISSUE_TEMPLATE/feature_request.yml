name: Feature request
description: Suggest an idea or improvement for noteser
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem or use case
      description: What are you trying to do that is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution (optional)
      description: How you imagine it working. Rough is fine.
    validations:
      required: false
